<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
      user-select: none;
    }
    h1 {
      margin-bottom: 10px;
      color: #0f0;
      font-size: 2rem;
      text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
    }
    #score {
      font-size: 1.5rem;
      margin-bottom: 20px;
      color: #0f0;
    }
    canvas {
      background: #000;
      border: 2px solid #333;
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
      max-width: 95vw;
      max-height: 70vh;
    }
    .controls {
      margin-top: 20px;
      color: #888;
      font-size: 0.9rem;
    }
    @media (max-width: 600px) {
      h1 { font-size: 1.5rem; }
      #score { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <h1>Snake</h1>
  <div id="score">Score: 0</div>
  <canvas id="game"></canvas>
  <div class="controls">Use Arrow Keys or WASD to move</div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    // Responsive canvas size
    const size = Math.min(window.innerWidth * 0.95, 400);
    canvas.width = size;
    canvas.height = size;

    const grid = 20;
    let count = 0;
    let score = 0;
    let snake = { x: 160, y: 160, dx: grid, dy: 0, cells: [], maxCells: 4 };
    let apple = { x: 320, y: 320 };
    let gameOver = false;

    function getRandomInt(min, max) {
      return Math.floor(Math.random() * (max - min)) + min;
    }

    function reset() {
      snake.x = size / 2;
      snake.y = size / 2;
      snake.cells = [];
      snake.maxCells = 4;
      snake.dx = grid;
      snake.dy = 0;
      score = 0;
      updateScore();
      apple.x = getRandomInt(0, Math.floor(canvas.width / grid)) * grid;
      apple.y = getRandomInt(0, Math.floor(canvas.height / grid)) * grid;
      gameOver = false;
    }

    function updateScore() {
      scoreEl.textContent = 'Score: ' + score;
    }

    function loop() {
      requestAnimationFrame(loop);
      if (++count < 6 || gameOver) return;
      count = 0;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Move snake
      snake.x += snake.dx;
      snake.y += snake.dy;

      // Wall wrapping
      if (snake.x < 0) snake.x = canvas.width - grid;
      else if (snake.x >= canvas.width) snake.x = 0;
      if (snake.y < 0) snake.y = canvas.height - grid;
      else if (snake.y >= canvas.height) snake.y = 0;

      snake.cells.unshift({ x: snake.x, y: snake.y });
      if (snake.cells.length > snake.maxCells) snake.cells.pop();

      // Draw apple
      ctx.fillStyle = 'red';
      ctx.fillRect(apple.x, apple.y, grid - 1, grid - 1);

      // Draw snake and check collision
      ctx.fillStyle = 'lime';
      snake.cells.forEach(function (cell, index) {
        ctx.fillRect(cell.x, cell.y, grid - 1, grid - 1);

        // Eat apple
        if (cell.x === apple.x && cell.y === apple.y) {
          snake.maxCells++;
          score += 10;
          updateScore();
          apple.x = getRandomInt(0, Math.floor(canvas.width / grid)) * grid;
          apple.y = getRandomInt(0, Math.floor(canvas.height / grid)) * grid;
        }

        // Self collision
        for (let i = index + 1; i < snake.cells.length; i++) {
          if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
            gameOver = true;
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#f00';
            ctx.font = 'bold 24px system-ui';
            ctx.textAlign = 'center';
            ctx.fillText('Game Over!', canvas.width / 2, canvas.height / 2 - 15);
            ctx.fillStyle = '#fff';
            ctx.font = '16px system-ui';
            ctx.fillText('Press Space to Restart', canvas.width / 2, canvas.height / 2 + 15);
          }
        }
      });
    }

    function handleKey(e) {
      const key = e.key.toLowerCase();
      if ((key === 'arrowup' || key === 'w') && snake.dy === 0) {
        snake.dy = -grid; snake.dx = 0;
      } else if ((key === 'arrowdown' || key === 's') && snake.dy === 0) {
        snake.dy = grid; snake.dx = 0;
      } else if ((key === 'arrowleft' || key === 'a') && snake.dx === 0) {
        snake.dx = -grid; snake.dy = 0;
      } else if ((key === 'arrowright' || key === 'd') && snake.dx === 0) {
        snake.dx = grid; snake.dy = 0;
      } else if (key === ' ' && gameOver) {
        reset();
      }
    }

    document.addEventListener('keydown', handleKey);

    // Touch controls for mobile
    let touchStartX = 0, touchStartY = 0;
    canvas.addEventListener('touchstart', function (e) {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      e.preventDefault();
    }, { passive: false });

    canvas.addEventListener('touchend', function (e) {
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 0 && snake.dx === 0) { snake.dx = grid; snake.dy = 0; }
        else if (dx < 0 && snake.dx === 0) { snake.dx = -grid; snake.dy = 0; }
      } else {
        if (dy > 0 && snake.dy === 0) { snake.dy = grid; snake.dx = 0; }
        else if (dy < 0 && snake.dy === 0) { snake.dy = -grid; snake.dx = 0; }
      }
      e.preventDefault();
    }, { passive: false });

    // Initialize apple position
    apple.x = getRandomInt(0, Math.floor(canvas.width / grid)) * grid;
    apple.y = getRandomInt(0, Math.floor(canvas.height / grid)) * grid;

    requestAnimationFrame(loop);
  </script>
</body>
</html>
