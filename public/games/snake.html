<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
      user-select: none;
      touch-action: none;
    }
    #hud {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 10px;
    }
    #score {
      font-size: 1.5rem;
      color: #0f0;
    }
    #title {
      font-size: 1.5rem;
      color: #0f0;
      text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
    }
    canvas {
      background: #000;
      border: 2px solid #333;
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
      max-width: 95vw;
      max-height: 65vh;
    }
    .controls {
      margin-top: 15px;
      color: #555;
      font-size: 0.85rem;
    }
    /* Mobile D-pad */
    #mobile-controls {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      justify-content: space-between;
      padding: 0 30px;
      z-index: 100;
    }
    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 50px);
      grid-template-rows: repeat(3, 50px);
      gap: 5px;
    }
    .dpad-btn {
      background: rgba(0, 255, 0, 0.15);
      border: 2px solid rgba(0, 255, 0, 0.4);
      border-radius: 8px;
      color: #0f0;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }
    .dpad-btn:active {
      background: rgba(0, 255, 0, 0.35);
    }
    .dpad-center {
      background: transparent;
      border: none;
    }
    @media (pointer: coarse) {
      #mobile-controls { display: flex; }
      .controls { display: none; }
    }
    @media (max-height: 600px) {
      canvas { max-height: 55vh; }
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="title">Snake</div>
    <div id="score">Score: 0</div>
  </div>
  <canvas id="game"></canvas>
  <div id="mobile-controls">
    <div class="dpad">
      <div class="dpad-btn dpad-center"></div>
      <button class="dpad-btn" id="btn-up">&#9650;</button>
      <div class="dpad-btn dpad-center"></div>
      <button class="dpad-btn" id="btn-left">&#9664;</button>
      <div class="dpad-btn dpad-center"></div>
      <button class="dpad-btn" id="btn-right">&#9654;</button>
      <div class="dpad-btn dpad-center"></div>
      <button class="dpad-btn" id="btn-down">&#9660;</button>
      <div class="dpad-btn dpad-center"></div>
    </div>
    <div style="width:100px;"></div>
  </div>
  <div class="controls">Use Arrow Keys or WASD to move</div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    // Responsive canvas size
    function resize() {
      const maxW = Math.min(window.innerWidth * 0.95, 400);
      const maxH = Math.min(window.innerHeight * 0.5, 400);
      const size = Math.min(maxW, maxH);
      canvas.width = size;
      canvas.height = size;
    }
    resize();
    window.addEventListener('resize', resize);

    const grid = 20;
    let count = 0;
    let score = 0;
    let snake = { x: 160, y: 160, dx: grid, dy: 0, cells: [], maxCells: 4 };
    let apple = { x: 320, y: 320 };
    let gameOver = false;
    let gameStarted = true;
    let lastDirection = null;

    function getRandomInt(min, max) {
      return Math.floor(Math.random() * (max - min)) + min;
    }

    function reset() {
      const size = canvas.width;
      snake.x = Math.floor(size / 2 / grid) * grid;
      snake.y = Math.floor(size / 2 / grid) * grid;
      snake.cells = [];
      snake.maxCells = 4;
      snake.dx = grid;
      snake.dy = 0;
      score = 0;
      lastDirection = null;
      updateScore();
      apple.x = getRandomInt(0, Math.floor(canvas.width / grid)) * grid;
      apple.y = getRandomInt(0, Math.floor(canvas.height / grid)) * grid;
      gameOver = false;
      gameStarted = true;
    }

    function updateScore() {
      scoreEl.textContent = 'Score: ' + score;
    }

    function setDirection(dx, dy) {
      // Prevent 180-degree turns
      if (snake.dx === -dx && dx !== 0) return;
      if (snake.dy === -dy && dy !== 0) return;
      // Prevent same direction
      if (snake.dx === dx && snake.dy === dy) return;

      const newDx = dx === 0 ? 0 : (dx > 0 ? grid : -grid);
      const newDy = dy === 0 ? 0 : (dy > 0 ? grid : -grid);

      // Only allow turning once per frame
      if (lastDirection !== null) return;
      if ((newDx !== 0 && snake.dx !== 0 && newDx !== snake.dx) ||
          (newDy !== 0 && snake.dy !== 0 && newDy !== snake.dy)) {
        // Turning
      }

      if (newDx !== 0) {
        snake.dx = newDx;
        snake.dy = 0;
      } else if (newDy !== 0) {
        snake.dy = newDy;
        snake.dx = 0;
      }
      lastDirection = { dx: newDx, dy: newDy };
    }

    function handleKey(e) {
      const key = e.key.toLowerCase();
      if ((key === 'arrowup' || key === 'w') && snake.dy === 0) {
        setDirection(0, -1);
      } else if ((key === 'arrowdown' || key === 's') && snake.dy === 0) {
        setDirection(0, 1);
      } else if ((key === 'arrowleft' || key === 'a') && snake.dx === 0) {
        setDirection(-1, 0);
      } else if ((key === 'arrowright' || key === 'd') && snake.dx === 0) {
        setDirection(1, 0);
      } else if (key === ' ' && gameOver) {
        reset();
      }
    }

    document.addEventListener('keydown', e => {
      if (['arrowup', 'arrowdown', 'arrowleft', 'arrowright', ' '].includes(e.key.toLowerCase()) ||
          ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
        e.preventDefault();
      }
      handleKey(e);
    });

    // Mobile D-pad controls
    const btnUp = document.getElementById('btn-up');
    const btnDown = document.getElementById('btn-down');
    const btnLeft = document.getElementById('btn-left');
    const btnRight = document.getElementById('btn-right');

    btnUp.addEventListener('touchstart', e => { e.preventDefault(); setDirection(0, -1); }, { passive: false });
    btnDown.addEventListener('touchstart', e => { e.preventDefault(); setDirection(0, 1); }, { passive: false });
    btnLeft.addEventListener('touchstart', e => { e.preventDefault(); setDirection(-1, 0); }, { passive: false });
    btnRight.addEventListener('touchstart', e => { e.preventDefault(); setDirection(1, 0); }, { passive: false });

    // Touch swipe controls on canvas
    let touchStartX = 0, touchStartY = 0;
    canvas.addEventListener('touchstart', function (e) {
      if (!gameStarted || gameOver) {
        reset();
      }
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      e.preventDefault();
    }, { passive: false });

    canvas.addEventListener('touchend', function (e) {
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      const absDx = Math.abs(dx);
      const absDy = Math.abs(dy);

      if (Math.max(absDx, absDy) < 20) return; // too short

      if (absDx > absDy) {
        setDirection(dx > 0 ? 1 : -1, 0);
      } else {
        setDirection(0, dy > 0 ? 1 : -1);
      }
      e.preventDefault();
    }, { passive: false });

    // Initialize apple position
    apple.x = getRandomInt(0, Math.floor(canvas.width / grid)) * grid;
    apple.y = getRandomInt(0, Math.floor(canvas.height / grid)) * grid;

    function loop() {
      requestAnimationFrame(loop);
      if (!gameStarted || gameOver) return;
      if (++count < 6) return;
      count = 0;
      lastDirection = null; // Reset direction lock each frame

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Move snake
      snake.x += snake.dx;
      snake.y += snake.dy;

      // Wall wrapping
      if (snake.x < 0) snake.x = canvas.width - grid;
      else if (snake.x >= canvas.width) snake.x = 0;
      if (snake.y < 0) snake.y = canvas.height - grid;
      else if (snake.y >= canvas.height) snake.y = 0;

      snake.cells.unshift({ x: snake.x, y: snake.y });
      if (snake.cells.length > snake.maxCells) snake.cells.pop();

      // Draw apple
      ctx.fillStyle = 'red';
      ctx.fillRect(apple.x, apple.y, grid - 1, grid - 1);

      // Draw snake and check collision
      ctx.fillStyle = 'lime';
      snake.cells.forEach(function (cell, index) {
        ctx.fillRect(cell.x, cell.y, grid - 1, grid - 1);

        // Eat apple
        if (cell.x === apple.x && cell.y === apple.y) {
          snake.maxCells++;
          score += 10;
          updateScore();
          apple.x = getRandomInt(0, Math.floor(canvas.width / grid)) * grid;
          apple.y = getRandomInt(0, Math.floor(canvas.height / grid)) * grid;
        }

        // Self collision
        for (let i = index + 1; i < snake.cells.length; i++) {
          if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
            gameOver = true;
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#f00';
            ctx.font = 'bold 22px system-ui';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
            ctx.fillStyle = '#fff';
            ctx.font = '14px system-ui';
            ctx.fillText('Score: ' + score, canvas.width / 2, canvas.height / 2 + 5);
            ctx.fillStyle = '#0f0';
            ctx.fillText('Tap to Restart', canvas.width / 2, canvas.height / 2 + 30);
          }
        }
      });
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
