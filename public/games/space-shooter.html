<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Space Shooter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
      user-select: none;
      touch-action: none;
    }
    #hud {
      position: absolute;
      top: 10px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      padding: 0 15px;
      font-size: 1rem;
      z-index: 10;
    }
    #hud span { color: #0ff; text-shadow: 0 0 5px #0ff; }
    #hud #lives { color: #f44; text-shadow: 0 0 5px #f44; }
    canvas {
      background: linear-gradient(to bottom, #0a0a1a 0%, #1a1a3a 100%);
      border: 1px solid #333;
      max-width: 100vw;
      max-height: 100vh;
    }
    .controls {
      position: absolute;
      bottom: 10px;
      color: #555;
      font-size: 0.8rem;
    }
    #mobile-controls {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      display: none;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 10;
    }
    .mobile-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(0, 255, 255, 0.2);
      border: 2px solid rgba(0, 255, 255, 0.5);
      color: #0ff;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
    }
    .mobile-btn:active { background: rgba(0, 255, 255, 0.4); }
    #fire-area {
      width: 80px;
      height: 80px;
      background: rgba(255, 100, 0, 0.3);
      border-color: rgba(255, 100, 0, 0.7);
      color: #f60;
      font-size: 20px;
    }
    #fire-area:active { background: rgba(255, 100, 0, 0.5); }
    @media (pointer: coarse) {
      #mobile-controls { display: flex; }
      .controls { display: none; }
    }
  </style>
</head>
<body>
  <div id="hud">
    <span>Score: <b id="score">0</b></span>
    <span>Lives: <b id="lives">3</b></span>
  </div>
  <canvas id="game"></canvas>
  <div id="mobile-controls">
    <div style="display:flex;gap:10px;">
      <button class="mobile-btn" id="btn-left">&#9664;</button>
      <button class="mobile-btn" id="btn-right">&#9654;</button>
    </div>
    <button class="mobile-btn" id="fire-area">FIRE</button>
  </div>
  <div class="controls">Arrow Keys or WASD to move, Space to shoot</div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');

    // Responsive canvas
    function resize() {
      const w = Math.min(window.innerWidth, 400);
      const h = Math.min(window.innerHeight * 0.85, 600);
      canvas.width = w;
      canvas.height = h;
    }
    resize();
    window.addEventListener('resize', () => { resize(); });

    // Game state - initialized properly
    let player = null;
    let bullets = [];
    let enemies = [];
    let particles = [];
    let score = 0;
    let lives = 3;
    let gameOver = false;
    let gameStarted = false;
    let enemyTimer = 0;
    let lastTime = 0;
    let keys = {};
    let touchLeft = false, touchRight = false, touchFire = false;

    function resetGame() {
      player = {
        x: canvas.width / 2,
        y: canvas.height - 50,
        w: 30,
        h: 20,
        speed: 250,
        cooldown: 0,
      };
      bullets = [];
      enemies = [];
      particles = [];
      score = 0;
      lives = 3;
      gameOver = false;
      gameStarted = true;
      enemyTimer = 0;
      updateHUD();
    }

    function updateHUD() {
      scoreEl.textContent = score;
      livesEl.textContent = lives;
    }

    // Input
    document.addEventListener('keydown', e => {
      keys[e.key.toLowerCase()] = true;
      if (e.key === ' ') e.preventDefault();
    });
    document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    // Mobile controls
    const btnLeft = document.getElementById('btn-left');
    const btnRight = document.getElementById('btn-right');
    const fireArea = document.getElementById('fire-area');

    btnLeft.addEventListener('touchstart', e => { touchLeft = true; e.preventDefault(); }, { passive: false });
    btnLeft.addEventListener('touchend', e => { touchLeft = false; e.preventDefault(); }, { passive: false });
    btnRight.addEventListener('touchstart', e => { touchRight = true; e.preventDefault(); }, { passive: false });
    btnRight.addEventListener('touchend', e => { touchRight = false; e.preventDefault(); }, { passive: false });
    fireArea.addEventListener('touchstart', e => { touchFire = true; e.preventDefault(); }, { passive: false });
    fireArea.addEventListener('touchend', e => { touchFire = false; e.preventDefault(); }, { passive: false });

    // Shoot
    function shoot() {
      if (player) {
        bullets.push({ x: player.x, y: player.y - player.h / 2, speed: 400 });
      }
    }

    // Spawn enemy
    function spawnEnemy() {
      const size = 20 + Math.random() * 15;
      enemies.push({
        x: Math.random() * (canvas.width - size),
        y: -size,
        w: size,
        h: size,
        speed: 80 + Math.random() * 60 + score * 0.5,
        wobble: Math.random() * Math.PI * 2,
      });
    }

    // Explosion particles
    function explode(x, y, color) {
      for (let i = 0; i < 8; i++) {
        const angle = (Math.PI * 2 / 8) * i;
        const speed = 50 + Math.random() * 80;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 0.4 + Math.random() * 0.3,
          color,
        });
      }
    }

    // Update
    function update(dt) {
      if (!gameStarted || gameOver) return;

      // Player movement
      const moveLeft = keys['arrowleft'] || keys['a'] || touchLeft;
      const moveRight = keys['arrowright'] || keys['d'] || touchRight;

      if (moveLeft) player.x -= player.speed * dt;
      if (moveRight) player.x += player.speed * dt;
      player.x = Math.max(player.w / 2, Math.min(canvas.width - player.w / 2, player.x));

      // Update bullets
      for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].y -= bullets[i].speed * dt;
        if (bullets[i].y < -10) bullets.splice(i, 1);
      }

      // Spawn enemies
      enemyTimer += dt;
      const spawnRate = Math.max(0.4, 1.5 - score * 0.01);
      if (enemyTimer > spawnRate) {
        enemyTimer = 0;
        spawnEnemy();
      }

      // Update enemies
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        e.wobble += dt * 2;
        e.y += e.speed * dt;
        e.x += Math.sin(e.wobble) * 30 * dt;

        // Bullet collision
        for (let j = bullets.length - 1; j >= 0; j--) {
          const b = bullets[j];
          if (b.x > e.x - e.w / 2 && b.x < e.x + e.w / 2 &&
              b.y > e.y - e.h / 2 && b.y < e.y + e.h / 2) {
            explode(e.x, e.y, '#f80');
            enemies.splice(i, 1);
            bullets.splice(j, 1);
            score += 10;
            updateHUD();
            break;
          }
        }

        // Player collision
        if (enemies[i] && !gameOver) {
          const e = enemies[i];
          if (player.x + player.w / 2 > e.x - e.w / 2 &&
              player.x - player.w / 2 < e.x + e.w / 2 &&
              player.y + player.h / 2 > e.y - e.h / 2 &&
              player.y - player.h / 2 < e.y + e.h / 2) {
            explode(e.x, e.y, '#f00');
            enemies.splice(i, 1);
            lives--;
            updateHUD();
            if (lives <= 0) {
              gameOver = true;
              if (player) explode(player.x, player.y, '#0ff');
            }
          }
        }

        // Off screen
        if (enemies[i] && enemies[i].y > canvas.height + 20) {
          enemies.splice(i, 1);
        }
      }

      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= dt;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    // Draw
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Stars background
      ctx.fillStyle = '#fff';
      for (let i = 0; i < 50; i++) {
        const sx = ((i * 137) % canvas.width);
        const sy = ((i * 223 + lastTime * 10) % canvas.height);
        ctx.globalAlpha = 0.3 + (i % 5) * 0.15;
        ctx.fillRect(sx, sy, 1, 1);
      }
      ctx.globalAlpha = 1;

      // Particles
      particles.forEach(p => {
        ctx.globalAlpha = Math.max(0, p.life * 2);
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
      });
      ctx.globalAlpha = 1;

      // Bullets
      if (bullets.length > 0) {
        ctx.fillStyle = '#0ff';
        ctx.shadowBlur = 8;
        ctx.shadowColor = '#0ff';
        bullets.forEach(b => {
          ctx.fillRect(b.x - 1.5, b.y - 8, 3, 16);
        });
        ctx.shadowBlur = 0;
      }

      // Enemies
      enemies.forEach(e => {
        ctx.fillStyle = '#f44';
        ctx.shadowBlur = 6;
        ctx.shadowColor = '#f44';
        ctx.beginPath();
        ctx.moveTo(e.x, e.y - e.h / 2);
        ctx.lineTo(e.x + e.w / 2, e.y + e.h / 2);
        ctx.lineTo(e.x - e.w / 2, e.y + e.h / 2);
        ctx.closePath();
        ctx.fill();
        ctx.shadowBlur = 0;
      });

      // Player
      if (player && !gameOver) {
        ctx.fillStyle = '#0ff';
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#0ff';
        ctx.beginPath();
        ctx.moveTo(player.x, player.y - player.h / 2);
        ctx.lineTo(player.x + player.w / 2, player.y + player.h / 2);
        ctx.lineTo(player.x, player.y + player.h / 4);
        ctx.lineTo(player.x - player.w / 2, player.y + player.h / 2);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#f80';
        ctx.shadowColor = '#f80';
        const flameH = 5 + Math.random() * 8;
        ctx.fillRect(player.x - 4, player.y + player.h / 4, 8, flameH);
        ctx.shadowBlur = 0;
      }

      // Game Over
      if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#f44';
        ctx.font = 'bold 28px system-ui';
        ctx.textAlign = 'center';
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#f44';
        ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#fff';
        ctx.font = '16px system-ui';
        ctx.fillText('Score: ' + score, canvas.width / 2, canvas.height / 2 + 10);
        ctx.fillStyle = '#0ff';
        ctx.font = '14px system-ui';
        ctx.fillText('Press Space to Restart', canvas.width / 2, canvas.height / 2 + 40);
      }

      // Start screen
      if (!gameStarted) {
        ctx.fillStyle = '#0ff';
        ctx.font = 'bold 24px system-ui';
        ctx.textAlign = 'center';
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#0ff';
        ctx.fillText('SPACE SHOOTER', canvas.width / 2, canvas.height / 2 - 30);
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#fff';
        ctx.font = '14px system-ui';
        ctx.fillText('Press Space to Start', canvas.width / 2, canvas.height / 2 + 10);
      }
    }

    // Game loop
    function loop(time) {
      if (lastTime === 0) lastTime = time;
      const dt = Math.min((time - lastTime) / 1000, 0.1);
      lastTime = time;

      // Handle start/restart with space
      if (keys[' ']) {
        if (!gameStarted || gameOver) {
          keys[' '] = false;
          resetGame();
        }
      }

      // Handle firing with space or touch
      if (gameStarted && !gameOver && player && player.cooldown <= 0) {
        if (keys[' '] || touchFire) {
          shoot();
          player.cooldown = 0.15;
        }
      }

      // Always decrement cooldown when not firing
      if (player && player.cooldown > 0) {
        player.cooldown -= dt;
      }

      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    // Touch to start on mobile
    canvas.addEventListener('touchstart', () => {
      if (!gameStarted || gameOver) {
        resetGame();
      }
    });

    requestAnimationFrame(loop);
  </script>
</body>
</html>
